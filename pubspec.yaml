name: gwcl
description: Integrate e-billing system for the management of all aspect of ghana water customer billing processes.
publish_to: none

version: 1.3.0+38

environment:
  sdk: ">=3.9.0 <3.12.0"

dependencies:
  flutter:
    sdk: flutter
  platform: ^3.1.0
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.0.5
  modal_progress_hud_nsn: ^0.3.0
  dio: ^4.0.0
  path: ^1.8.0
  path_provider: ^2.0.1
  sqflite: ^2.2.0+3
  webview_flutter: ^4.10.0
  share_plus: ^10.1.3
  intl: any
  url_launcher: ^6.0.3
  device_info_plus: ^11.1.0
  package_info_plus: ^8.1.2
  local_auth: ^2.3.0
  sms_autofill: ^2.4.1
  cached_network_image: ^3.0.0
  flutter_countdown_timer: ^4.1.0
  flutter_image_compress: ^2.3.0
  open_file_plus: ^3.4.1
  # Updated to a modern version that supports the v2 Android embedding.
  app_settings: ^7.0.0
  flutter_typeahead: ^4.3.7
  awesome_card: ^1.1.7
  flash: ^3.1.0
  geolocator: ^13.0.1
  flutter_screenutil: ^5.8.4
  carousel_slider: ^5.0.0
  photo_view: ^0.14.0
  mixpanel_flutter: ^2.3.3
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  permission_handler: ^10.2.0
  rxdart: ^0.27.7
  reviews_slider: ^2.0.0
  flutter_advanced_drawer: ^1.3.2
  encrypt: ^5.0.1
  flutter_rounded_date_picker: ^3.0.4
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.1.2
  cool_alert: ^2.0.1

  flutter_localizations:
    sdk: flutter
  introduction_screen: ^3.1.12

  # Local Plugins
  #encrypt: #both
  #  path: plugins/encrypt
  # multi_image_picker: #both
  #   path: plugins/multi_image_picker
  # cool_alert: #both
  #   path: plugins/cool_alert
#  flutter_rounded_date_picker: #both
#    path: plugins/flutter_rounded_date_picker

dev_dependencies:
  flutter_test:
    sdk: flutter
  pedantic: ^1.8.0+1
  build_runner: ^2.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Regular.ttf
    - family: Rubik-Light
      fonts:
        - asset: assets/fonts/Rubik-Light.ttf
          weight: 200
    - family: Rubik-Medium
      fonts:
        - asset: assets/fonts/Rubik-Medium.ttf
          weight: 400
    - family: Rubik-Bold
      fonts:
        - asset: assets/fonts/Rubik-Bold.ttf
          weight: 700

    - family: Gotham
      fonts:
        - asset: assets/fonts/GothamBook.ttf
    - family: GothamLight
      fonts:
        - asset: assets/fonts/GothamLight.ttf
    - family: GothamMedium
      fonts:
        - asset: assets/fonts/GothamMedium.ttf
    - family: GothamBold
      fonts:
        - asset: assets/fonts/GothamBold.ttf

    - family: MavenPro
      fonts:
        - asset: assets/fonts/MavenPro-Regular.ttf
          weight: 400
        - asset: assets/fonts/MavenPro-Medium.ttf
          weight: 500
        - asset: assets/fonts/MavenPro-Bold.ttf
          weight: 700

dependency_overrides:
  # Workaround for Flutter/Dart removing `hashValues` (flare_flutter 3.0.2 fails to compile).
  # Source: https://github.com/2d-inc/Flare-Flutter/issues/325
  flare_flutter:
    git:
      url: https://github.com/mbfakourii/Flare-Flutter.git
      path: flare_flutter
      ref: remove_hashValues
